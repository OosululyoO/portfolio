backend:
  name: github
  repo: OosululyoO/portfolio
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"
# ... backend 等設定保持不變 ...

collections:
  # 新增：分類管理設定 (全域)
  - name: "settings"
    label: "Global Settings (全域設定)"
    files:
      - name: "categories"
        label: "Categories Management (分類管理)"
        file: "src/content/settings/categories.yml"
        fields:
          - label: "Portfolio Categories"
            name: "portfolio_cats"
            widget: "list"
            field: { label: "Category Name", name: "name", widget: "string" }
          - label: "Achievement Categories"
            name: "achievement_cats"
            widget: "list"
            field: { label: "Category Name", name: "name", widget: "string" }
          - label: "Activity Categories"
            name: "activity_cats"
            widget: "list"
            field: { label: "Category Name", name: "name", widget: "string" }

  # 修改：Portfolio (將 category 改為從上述列表選取)
  - name: "portfolio"
    label: "Portfolio (作品)"
    folder: "src/content/portfolio"
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Category"
        name: "category"
        widget: "relation" # 使用關聯組件
        collection: "settings"
        file: "categories"
        search_fields: ["portfolio_cats.*.name"]
        display_fields: ["portfolio_cats.*.name"]
        value_field: "portfolio_cats.*.name"
        required: false # 設為選配
      - { label: "Featured Image", name: "thumbnail", widget: "image", required: false }
      - { label: "Short Description", name: "description", widget: "string" }
      - { label: "Full Content", name: "body", widget: "markdown" }

  # 修改：Achievements (同樣加入選配 Category)
  - name: "achievements"
    label: "Achievements (競賽獎項)"
    folder: "src/content/achievements"
    create: true
    fields:
      - { label: "Award Name", name: "title", widget: "string" }
      - label: "Category"
        name: "category"
        widget: "relation"
        collection: "settings"
        file: "categories"
        search_fields: ["achievement_cats.*.name"]
        display_fields: ["achievement_cats.*.name"]
        value_field: "achievement_cats.*.name"
        required: false
      - { label: "Year", name: "year", widget: "string" }
      - { label: "Summary", name: "description", widget: "text" }