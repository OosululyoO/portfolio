backend:
  name: github
  repo: OosululyoO/portfolio
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  # 1. Portfolio: 加入 Tags 方便分類顯示
  - name: "portfolio"
    label: "Portfolio (作品)"
    folder: "src/content/portfolio"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Category", name: "category", widget: "select", options: ["AIoT", "Software"] }
      - { label: "Featured Image", name: "thumbnail", widget: "image", required: false }
      - { label: "Short Description", name: "description", widget: "string" } # 修改此處以對應前端
      - { label: "Tags", name: "tags", widget: "list", default: ["ESP32", "React"] }
      - { label: "Full Content", name: "body", widget: "markdown" }

  # 2. Achievements: 統一年份與描述欄位
  - name: "achievements"
    label: "Achievements (競賽獎項)"
    folder: "src/content/achievements"
    create: true
    fields:
      - { label: "Award Name", name: "title", widget: "string" }
      - { label: "Organization", name: "organization", widget: "string" }
      - { label: "Year", name: "year", widget: "string", hint: "例如: 2025" } # 修改此處
      - { label: "Summary", name: "description", widget: "text" } # 修改此處
      - { label: "Certificate Image", name: "image", widget: "image", required: false }

  # 3. Activities: 活動紀錄
  - name: "activities"
    label: "Activities (活動紀錄)"
    folder: "src/content/activities"
    create: true
    fields:
      - { label: "Event Name", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Content", name: "body", widget: "markdown" }