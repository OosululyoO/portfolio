backend:
  name: github
  repo: OosululyoO/portfolio
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"
# ... backend 等設定保持不變 ...
# ... backend 等設定保持不變 ...

collections:
  # 1. 全域設定：簡化為單一通用清單
  - name: "settings"
    label: "Global Settings (全域設定)"
    files:
      - name: "categories"
        label: "Categories Management (分類管理)"
        file: "src/content/settings/categories.yml"
        fields:
          - label: "All Categories (所有類別)"
            name: "all_categories"
            widget: "list"
            field: { label: "Category Name", name: "name", widget: "string" }

  # 2. Portfolio: 關聯到通用清單
  - name: "portfolio"
    label: "Portfolio (作品)"
    folder: "src/content/portfolio"
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Category"
        name: "category"
        widget: "relation"
        collection: "settings"
        file: "categories"
        search_fields: ["all_categories.*.name"]
        display_fields: ["all_categories.*.name"]
        value_field: "all_categories.*.name"
        required: false
      - { label: "Featured Image", name: "thumbnail", widget: "image", required: false }
      - { label: "Short Description", name: "description", widget: "string" }
      - { label: "Full Content", name: "body", widget: "markdown" }

  # 3. Achievements: 同樣關聯到同一個通用清單
  - name: "achievements"
    label: "Achievements (競賽獎項)"
    folder: "src/content/achievements"
    create: true
    fields:
      - { label: "Award Name", name: "title", widget: "string" }
      - label: "Category"
        name: "category"
        widget: "relation"
        collection: "settings"
        file: "categories"
        search_fields: ["all_categories.*.name"]
        display_fields: ["all_categories.*.name"]
        value_field: "all_categories.*.name"
        required: false
      - { label: "Year", name: "year", widget: "string" }
      - { label: "Summary", name: "description", widget: "text" }

  # 4. Activities: 亦同
  - name: "activities"
    label: "Activities (活動紀錄)"
    folder: "src/content/activities"
    create: true
    fields:
      - { label: "Event Name", name: "title", widget: "string" }
      - label: "Category"
        name: "category"
        widget: "relation"
        collection: "settings"
        file: "categories"
        search_fields: ["all_categories.*.name"]
        display_fields: ["all_categories.*.name"]
        value_field: "all_categories.*.name"
        required: false
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Content", name: "body", widget: "markdown" }