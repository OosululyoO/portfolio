# 1. 後端與授權設定
backend:
  name: github
  repo: OosululyoO/portfolio
  branch: main
  # 刪除原本的 base_url，改用 site_domain
  base_url: "https://netlify-cms-github-oauth-provider-theta-blush.vercel.app"

# ... 下面的 media_folder 等設定維持原樣不變

# 2. 媒體檔案路徑 (確保整個檔案只有這一組)
# 修正 config.yml 的媒體設定
media_folder: "public/images/uploads"
public_folder: "images/uploads" 

# 3. 定義重複使用的欄位結構 (YAML 錨點)
common_fields: &common_fields
  - { label: "Title", name: "title", widget: "string" }
  - { label: "Category", name: "category", widget: "relation", collection: "settings", file: "categories", search_fields: ["all_categories.*.name"], display_fields: ["all_categories.*.name"], value_field: "all_categories.*.name", required: false }
  - label: "Main Images (主頁輪播照片)"
    name: "main_images"
    widget: "list"
    summary: "{{fields.image}}"
    field: { label: "Image", name: "image", widget: "image" }
  - label: "Extra Images (詳細頁末尾照片)"
    name: "extra_images"
    widget: "list"
    required: false
    field: { label: "Image", name: "image", widget: "image" }
  - { label: "Short Description", name: "description", widget: "string" }
  - { label: "Full Content", name: "body", widget: "markdown" }

# 4. 集合設定
collections:
  - name: "settings"
    label: "Global Settings"
    delete: false
    files:
      - name: "hero"
        label: "Homepage Hero"
        file: "src/content/settings/hero.yml"
        fields:
          - { label: "Main Title", name: "titleLine1", widget: "string" }
          - { label: "Accent Title", name: "titleAccent", widget: "string" }
          - { label: "Hero Description", name: "heroDescription", widget: "text" }
      - name: "categories"
        label: "Categories Management"
        file: "src/content/settings/categories.yml"
        fields:
          - label: "All Categories"
            name: "all_categories"
            widget: "list"
            field: { label: "Category Name", name: "name", widget: "string" }

  - name: "portfolio"
    label: "Portfolio (作品)"
    folder: "src/content/portfolio"
    create: true
    fields: *common_fields

  - name: "achievements"
    label: "Achievements (競賽獎項)"
    folder: "src/content/achievements"
    create: true
    fields: *common_fields

  - name: "activities"
    label: "Activities (活動紀錄)"
    folder: "src/content/activities"
    create: true
    fields: *common_fields

  - name: "about"
    label: "About (關於我資料)"
    folder: "src/content/about"
    create: true
    fields: *common_fields
